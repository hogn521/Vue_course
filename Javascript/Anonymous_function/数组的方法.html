<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <script>
      const numbers = [1, 2, 3, 4, 5];

      // 使用 reduce 求和
      const sum = numbers.reduce((total, num) => {
        console.log(`累积值: ${total}, 当前元素: ${num}`);
        return total + num;
      } ,0);
      console.log(sum);
      
    </script>
  </body>
</html>
