    <title>Document</title>

  <body>
    <script>
      // 普通函数严格模式下this指向undefined
      const obj = {
        sayHi: () => {
          console.log("sayHI的箭头函数的this指向的是", this);
        },
        sayhello: function () {
          console.log("SayHello的匿名函数指向的是", this);
        },
      };
      //   obj.sayHi();
      //   obj.sayhello();

      //   apply

      obj.sayHi.call(obj);
    </script>
  </body>
